<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MiniPrints Shop</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ---- Admin específico ---- */
    body { background: var(--gray-100); }

    /* Screens */
    .admin-screen { display: none; }
    .admin-screen.active { display: block; }

    /* PIN screen */
    #screen-pin {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--dark), #2d2d30);
    }
    #screen-pin.active { display: flex; }
    .pin-box {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }
    .pin-logo { font-size: 2.5rem; margin-bottom: 16px; }
    .pin-box h2 { color: #fff; font-size: 1.2rem; margin-bottom: 6px; }
    .pin-box p  { color: rgba(255,255,255,.5); font-size:.85rem; margin-bottom: 24px; }
    .pin-input {
      width: 100%;
      padding: 14px;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: .4em;
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.2);
      border-radius: var(--radius);
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      transition: var(--transition);
    }
    .pin-input:focus { border-color: var(--primary); }
    #pin-error { color: var(--danger); font-size:.82rem; margin-bottom:12px; display:none; }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      20%    {transform:translateX(-8px)}
      40%    {transform:translateX(8px)}
      60%    {transform:translateX(-6px)}
      80%    {transform:translateX(6px)}
    }
    .shake { animation: shake .45s ease; }

    /* Loading screen */
    #screen-loading {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: var(--dark);
      color: rgba(255,255,255,.7);
      font-size: .9rem;
    }
    #screen-loading.active { display: flex; }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* App screen */
    #screen-app { min-height: 100vh; display: none; }
    #screen-app.active { display: block; }

    /* Admin navbar */
    .admin-nav {
      background: var(--dark);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .admin-nav-brand { color: #fff; font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
    .admin-nav-brand span { color: var(--primary); }
    .admin-nav-actions { display: flex; align-items: center; gap: 10px; }
    .admin-nav a { color: rgba(255,255,255,.6); font-size: .82rem; padding: 6px 12px; border-radius: var(--radius-full); transition: var(--transition); }
    .admin-nav a:hover { color: #fff; background: rgba(255,255,255,.08); }

    /* Tabs */
    .admin-tabs {
      display: flex;
      gap: 4px;
      padding: 16px 20px 0;
      max-width: 1100px;
      margin: 0 auto;
    }
    .admin-tab {
      padding: 10px 20px;
      font-size: .875rem;
      font-weight: 600;
      color: var(--gray-600);
      border-radius: var(--radius-full) var(--radius-full) 0 0;
      transition: var(--transition);
      cursor: pointer;
      background: var(--gray-200);
    }
    .admin-tab.active { background: var(--white); color: var(--primary); }
    .admin-tab:hover { color: var(--dark); }

    /* Tab content */
    .admin-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    .tab-content {
      background: var(--white);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      padding: 24px;
      border: 1px solid var(--gray-200);
      display: none;
    }

    /* Tab header */
    .tab-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .tab-header h2 { font-size: 1.1rem; font-weight: 700; }

    /* Product rows */
    .admin-product-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--gray-200);
      margin-bottom: 8px;
      transition: var(--transition);
    }
    .admin-product-row:hover { border-color: var(--primary); background: var(--primary-light); }
    .admin-product-row.unavailable { opacity: .55; }
    .apr-img {
      width: 52px; height: 52px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--gray-100);
    }
    .apr-img img { width: 100%; height: 100%; object-fit: cover; }
    .apr-info { flex: 1; min-width: 0; }
    .apr-name { font-size: .9rem; font-weight: 700; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .apr-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .apr-cat   { font-size: .72rem; color: var(--gray-600); }
    .apr-price { font-size: .82rem; font-weight: 700; color: var(--primary); }
    .apr-badge { font-size: .65rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
    .apr-badge.star  { background: #FFF8DC; color: #B8860B; }
    .apr-badge.new-b { background: #E8F8EE; color: #1A7A35; }
    .apr-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .apr-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      font-size: .9rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
    }
    .apr-btn:hover { border-color: var(--primary); background: var(--primary-light); }
    .apr-btn.del:hover { border-color: var(--danger); background: #fff0f0; }
    .apr-toggle { font-size: 1rem; padding: 4px; border-radius: 6px; transition: var(--transition); }
    .admin-empty { text-align: center; padding: 40px; color: var(--gray-600); }

    /* Config form */
    .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Modal */
    #product-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }
    #product-modal.open { display: flex; }
    .modal-panel {
      background: var(--white);
      border-radius: var(--radius-lg);
      width: 100%;
      max-width: 640px;
      padding: 28px;
      margin: auto;
      position: relative;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--gray-200);
    }
    .modal-header h3 { font-size: 1.1rem; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--gray-100);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .modal-close:hover { background: var(--danger); color: #fff; }

    /* Form dentro del modal */
    #product-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    #product-form .form-group { margin-bottom: 12px; }
    #product-form .form-group label { font-size: .78rem; font-weight: 600; color: var(--gray-600); display:block; margin-bottom:4px; }
    #product-form input[type="text"],
    #product-form input[type="number"],
    #product-form input[type="url"],
    #product-form textarea,
    #product-form select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-size: .875rem;
      outline: none;
      transition: var(--transition);
      background: var(--white);
      color: var(--dark);
    }
    #product-form input:focus,
    #product-form textarea:focus,
    #product-form select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,.12); }
    #product-form textarea { resize: vertical; min-height: 72px; }

    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); }
    .checkbox-row label { font-size: .875rem; font-weight: 600; color: var(--dark); cursor: pointer; }

    .img-preview-box {
      width: 80px; height: 80px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1.5px solid var(--gray-200);
      flex-shrink: 0;
    }
    .img-preview-box img { width: 100%; height: 100%; object-fit: cover; }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--gray-200);
    }

    /* Responsive admin */
    @media (max-width: 600px) {
      .config-grid { grid-template-columns: 1fr; }
      #product-form .form-row { grid-template-columns: 1fr; }
      .tab-content { padding: 16px; }
      .admin-tabs { padding: 12px 12px 0; }
      .admin-main { padding: 0 12px 60px; }
    }
  </style>
</head>
<body>

<!-- ====== SCREEN: PIN ====== -->
<div class="admin-screen" id="screen-pin">
  <div class="pin-box">
    <div class="pin-logo">🔐</div>
    <h2>Panel de Administración</h2>
    <p>MiniPrints Shop — ingresa tu PIN</p>
    <input type="password" class="pin-input" id="pin-input"
           placeholder="••••" maxlength="6" autocomplete="off"
           inputmode="numeric">
    <div id="pin-error">PIN incorrecto, intenta de nuevo</div>
    <button class="btn btn-primary btn-block" onclick="handlePin()">Entrar</button>
  </div>
</div>

<!-- ====== SCREEN: LOADING ====== -->
<div class="admin-screen" id="screen-loading">
  <div class="loader"></div>
  <span id="loading-msg">Conectando…</span>
</div>

<!-- ====== SCREEN: APP ====== -->
<div class="admin-screen" id="screen-app">

  <!-- Admin Nav -->
  <nav class="admin-nav">
    <div class="admin-nav-brand">
      <div class="logo-hex" style="width:28px;height:28px;font-size:.6rem">MP</div>
      MiniPrints <span>Admin</span>
    </div>
    <div class="admin-nav-actions">
      <a href="index.html" target="_blank">Ver tienda ↗</a>
      <a href="#" onclick="logoutAdmin(); return false;">Cerrar sesión</a>
    </div>
  </nav>

  <!-- Tabs -->
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="productos">📦 Productos</button>
    <button class="admin-tab" data-tab="config">⚙️ Configuración</button>
  </div>

  <div class="admin-main">

    <!-- Tab: Productos -->
    <div class="tab-content" id="tab-productos" style="display:block">
      <div class="tab-header">
        <h2>Productos del catálogo</h2>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Agregar producto</button>
      </div>
      <div id="admin-product-list">
        <div class="admin-empty">Cargando productos…</div>
      </div>
    </div>

    <!-- Tab: Configuración -->
    <div class="tab-content" id="tab-config">
      <div class="tab-header">
        <h2>Configuración de la tienda</h2>
      </div>
      <div class="config-grid">
        <div class="form-group">
          <label>Nombre de la tienda</label>
          <input type="text" id="cfg-tienda" placeholder="MiniPrints Shop">
        </div>
        <div class="form-group">
          <label>Teléfono WhatsApp (sin + ni espacios)</label>
          <input type="text" id="cfg-whatsapp" placeholder="5215556366804">
        </div>
        <div class="form-group">
          <label>Envío gratis a partir de ($MXN)</label>
          <input type="number" id="cfg-envio" placeholder="800" min="0">
        </div>
        <div class="form-group">
          <label>Moneda</label>
          <input type="text" id="cfg-moneda" placeholder="MXN" maxlength="3">
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">Guardar configuración</button>
    </div>

  </div>
</div>

<!-- ====== MODAL: ADD/EDIT PRODUCTO ====== -->
<div id="product-modal">
  <div class="modal-panel">
    <div class="modal-header">
      <h3 id="modal-title">Agregar producto</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <form id="product-form" onsubmit="event.preventDefault(); saveProducto();">

      <!-- Imagen preview + URL -->
      <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:14px">
        <div class="img-preview-box">
          <img id="img-preview" src="img/placeholder.svg" alt="Preview">
        </div>
        <div class="form-group" style="flex:1;margin:0">
          <label>URL de la imagen</label>
          <input type="url" id="f-imagen" placeholder="https://... (sube a ImgBB, Google Photos, etc.)">
          <div style="font-size:.72rem;color:var(--gray-400);margin-top:4px">Sube tu foto a <a href="https://imgbb.com" target="_blank" style="color:var(--primary)">imgbb.com</a> y pega el link aquí</div>
        </div>
      </div>

      <!-- Nombre + categoría -->
      <div class="form-row">
        <div class="form-group">
          <label>Nombre del producto *</label>
          <input type="text" id="f-nombre" placeholder="Ej: Dragón Articulado" required>
        </div>
        <div class="form-group">
          <label>Categoría *</label>
          <select id="f-categoria">
            <!-- Inyectado por JS desde products.json -->
          </select>
        </div>
      </div>

      <!-- Precio -->
      <div class="form-row">
        <div class="form-group">
          <label>Precio ($MXN) *</label>
          <input type="number" id="f-precio" placeholder="350" min="0" required>
        </div>
        <div class="form-group">
          <label>Precio original (tachado, opcional)</label>
          <input type="number" id="f-precio-orig" placeholder="420" min="0">
        </div>
      </div>

      <!-- Descripción corta -->
      <div class="form-group">
        <label>Descripción corta (aparece en la tarjeta)</label>
        <input type="text" id="f-desc-corta" placeholder="Una línea que describa el producto" maxlength="120">
      </div>

      <!-- Descripción larga -->
      <div class="form-group">
        <label>Descripción completa (página de detalle)</label>
        <textarea id="f-descripcion" placeholder="Descripción detallada del producto, materiales, características…"></textarea>
      </div>

      <!-- Material + colores -->
      <div class="form-row">
        <div class="form-group">
          <label>Material</label>
          <input type="text" id="f-material" placeholder="PLA, PETG, Resina…">
        </div>
        <div class="form-group">
          <label>Colores disponibles (separados por coma)</label>
          <input type="text" id="f-colores" placeholder="Negro, Blanco, Rojo">
        </div>
      </div>

      <!-- Dimensiones + entrega + stock -->
      <div class="form-row">
        <div class="form-group">
          <label>Dimensiones</label>
          <input type="text" id="f-dimensiones" placeholder="10 × 10 × 15 cm">
        </div>
        <div class="form-group">
          <label>Tiempo de entrega</label>
          <input type="text" id="f-entrega" placeholder="3-5 días">
        </div>
      </div>

      <div class="form-group" style="max-width:200px">
        <label>Stock (unidades disponibles)</label>
        <input type="number" id="f-stock" placeholder="10" min="0">
      </div>

      <!-- Checkboxes -->
      <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:8px">
        <div class="checkbox-row">
          <input type="checkbox" id="f-disponible" checked>
          <label for="f-disponible">🟢 En venta (visible en tienda)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="f-destacado">
          <label for="f-destacado">⭐ Destacado (aparece en inicio)</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="f-nuevo">
          <label for="f-nuevo">✨ Etiqueta "Nuevo"</label>
        </div>
      </div>

      <div class="modal-footer">
        <button type="submit" class="btn btn-primary" id="save-btn" style="flex:1">
          Guardar producto
        </button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">
          Cancelar
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Firebase compat -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="js/firebase-shop.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
