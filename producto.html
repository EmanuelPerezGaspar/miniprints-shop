<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto — MiniPrints Shop</title>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <div class="logo-hex">MP</div>
      MiniPrints
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="tienda.html">Tienda</a>
    </div>
    <div class="nav-actions">
      <a href="carrito.html" class="cart-btn">
        🛒 <span class="cart-badge hidden" id="cart-badge">0</span>
      </a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Menú">☰</button>
    </div>
  </div>
</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <div class="mobile-menu-panel">
    <button class="close-btn" id="mobile-menu-close">✕</button>
    <a href="index.html">Inicio</a>
    <a href="tienda.html">Tienda</a>
    <a href="carrito.html">🛒 Carrito</a>
  </div>
</div>

<!-- BREADCRUMB -->
<div style="background:var(--white);border-bottom:1px solid var(--gray-200);padding:14px 0">
  <div class="container">
    <div class="breadcrumb">
      <a href="index.html">Inicio</a>
      <span>/</span>
      <a href="tienda.html">Tienda</a>
      <span>/</span>
      <span id="breadcrumb-name">Producto</span>
    </div>
  </div>
</div>

<!-- DETALLE -->
<div class="container">
  <div id="product-detail">
    <!-- Skeleton mientras carga -->
    <div class="product-detail" style="padding:40px 0">
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:22px"></div>
      <div>
        <div class="skeleton" style="height:14px;width:100px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:32px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:28px;width:120px;margin-bottom:24px"></div>
        <div class="skeleton" style="height:80px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:48px;border-radius:99px"></div>
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer" style="margin-top:60px">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025 MiniPrints Shop · <a href="tienda.html">Ver más productos</a></span>
    </div>
  </div>
</footer>

<script src="js/cart.js"></script>
<script src="js/app.js"></script>
<script>
  initProducto().then(() => {
    const p = DATA.productos.find(x => x.id === new URLSearchParams(location.search).get('id'));
    if (p) {
      const el = document.getElementById('breadcrumb-name');
      if (el) el.textContent = p.nombre;
    }
  });
</script>
</body>
</html>
